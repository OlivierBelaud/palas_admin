name: CI

on:
  pull_request:
    branches: [main, refactor, 'stack/**']
  push:
    branches: [main, refactor]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Reject committed secret literals
        run: node scripts/check-secrets.mjs --self-test && node scripts/check-secrets.mjs

  quality:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mandatory PostgreSQL Klaviyo delivery fence
        run: pnpm exec vitest run demo/commerce/tests/klaviyo-delivery-fence-postgres.test.ts --reporter=verbose
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Exhaustive quality gate
        run: pnpm check:quality
        env:
          SHOPIFY_CATALOG_WRITES_ENABLED: 'false'
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Install runtime browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Mandatory runtime smoke
        run: pnpm check:runtime
        env:
          SHOPIFY_CATALOG_WRITES_ENABLED: 'false'
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
