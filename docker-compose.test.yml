services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manta_test
      POSTGRES_PASSWORD: manta_test
      POSTGRES_DB: manta_test
    ports:
      - "5433:5432"  # Port 5433 to avoid conflicts with local PG
    tmpfs:
      - /var/lib/postgresql/data  # In RAM = fast + cleaned on stop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manta_test"]
      interval: 1s
      timeout: 3s
      retries: 10
